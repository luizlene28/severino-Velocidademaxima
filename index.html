<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>AutoVelox Pro – Velocímetro Realista</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root {
            --bg-deep: #0a0a0f;
            --card-bg: rgba(15, 15, 25, 0.92);
            --border-subtle: rgba(255, 255, 255, 0.12);
            --accent-red: #e0243f;
            --accent-amber: #f5a623;
            --accent-white: #f0f0f0;
            --font-digital: 'Orbitron', 'Segoe UI', 'Roboto', monospace;
            --font-ui: 'Inter', 'Segoe UI', 'Roboto', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-ui);
            background: #050508;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 12px;
            overflow-x: hidden;
            position: relative;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        .app-header {
            width: 96%;
            max-width: 580px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 16px;
            margin-bottom: 6px;
            background: rgba(20, 20, 30, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.6);
            z-index: 10;
        }
        .app-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: var(--font-digital);
            font-weight: 700;
            font-size: 1.3rem;
            color: #ffffff;
            letter-spacing: 1px;
        }
        .app-logo .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--accent-red);
            box-shadow: 0 0 10px var(--accent-red);
            animation: pulse-dot 1.8s infinite;
        }
        @keyframes pulse-dot {
            0%, 100% { box-shadow: 0 0 6px var(--accent-red); }
            50% { box-shadow: 0 0 18px var(--accent-red), 0 0 30px rgba(224, 36, 63, 0.6); }
        }
        .app-badge {
            background: #1a1a28;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.7rem;
            letter-spacing: 2px;
            color: #aaa;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-transform: uppercase;
        }

        .cube-corner {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 999;
            width: 22vmin;
            height: 22vmin;
            max-width: 110px;
            max-height: 110px;
            min-width: 75px;
            min-height: 75px;
            perspective: 1000px;
            filter: drop-shadow(0 0 18px rgba(245, 166, 35, 0.55));
            cursor: pointer;
        }
        .cube {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
        }
        .cube.rotating {
            animation: rotateCube 12s infinite linear;
        }
        .face {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 18, 0.88);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(245, 166, 35, 0.45);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            backface-visibility: hidden;
            font-size: clamp(0.65rem, 2vmin, 0.9rem);
        }
        .face span {
            font-size: 1.7em;
            display: block;
            color: var(--accent-amber);
            text-shadow: 0 0 18px var(--accent-amber);
        }
        .front { transform: translateZ(50px); }
        .back { transform: rotateY(180deg) translateZ(50px); }
        .left { transform: rotateY(-90deg) translateZ(50px); }
        .right { transform: rotateY(90deg) translateZ(50px); }
        .top { transform: rotateX(90deg) translateZ(50px); }
        .bottom { transform: rotateX(-90deg) translateZ(50px); }

        @keyframes rotateCube {
            0% { transform: rotateX(-12deg) rotateY(0deg); }
            100% { transform: rotateX(-12deg) rotateY(360deg); }
        }

        .hud-container {
            width: 96%;
            max-width: 580px;
            background: var(--card-bg);
            backdrop-filter: blur(18px);
            padding: 18px 16px 20px;
            border-radius: 32px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.75);
            border: 1px solid var(--border-subtle);
            position: relative;
            z-index: 1;
        }

        #panel-digital { display: block; }
        #panel-analog { display: none; }

        .speed-display { padding: 20px 0 6px; text-align: center; }
        .speed-value {
            font-size: clamp(8rem, 40vw, 18rem);
            font-weight: 900;
            color: #00ff88;
            line-height: 0.9;
            letter-spacing: -4px;
        }
        .unit {
            font-size: 1.1rem;
            letter-spacing: 8px;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
        }

        .analog-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            min-height: 420px;
        }
        canvas { display: block; max-width: 100%; height: auto; border-radius: 50%; }

        .progress-container {
            width: 100%;
            height: 10px;
            background: #111118;
            border-radius: 20px;
            margin: 14px 0 10px;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #4a90d9, var(--accent-red));
            transition: width 0.2s ease-out;
        }

        .gps-warning {
            text-align: center;
            color: var(--accent-amber);
            font-size: 0.75rem;
            margin-bottom: 8px;
            display: none;
        }

        .map-container {
            width: 100%;
            height: 35vh;
            max-height: 380px;
            border-radius: 24px;
            overflow: hidden;
            margin: 14px 0;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }
        #map { width: 100%; height: 100%; }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin: 10px 0 14px;
        }
        .card {
            background: rgba(255, 255, 255, 0.025);
            padding: 14px 4px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            text-align: center;
        }
        .card span { display: block; font-weight: 700; font-size: 1.2rem; color: #fff; margin-top: 4px; }
        .card label { font-size: 0.6rem; letter-spacing: 2px; color: #888; text-transform: uppercase; }

        .toggle-btn {
            margin: 6px auto 0;
            padding: 16px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: #181820;
            color: #fff;
            font-weight: 700;
            text-transform: uppercase;
            width: 100%;
            cursor: pointer;
            font-family: var(--font-digital);
        }

        @media (max-width: 600px) {
            .speed-value { font-size: clamp(6rem, 35vw, 12rem); }
            .map-container { height: 30vh; }
        }
    </style>
</head>
<body>

    <div class="app-header">
        <div class="app-logo"><span class="dot"></span> AutoVelox Pro</div>
        <div class="app-badge">v2.0 · Premium</div>
    </div>

    <div class="cube-corner" id="cubeCorner">
        <div class="cube rotating" id="cubeElement">
            <div class="face front"><label>LC</label><span>3D</span></div>
            <div class="face back"><label>SEVERINO</label><span>⚡</span></div>
            <div class="face left"><label>LC</label><span>PRO</span></div>
            <div class="face right"><label>SEVERINO</label><span>3D</span></div>
            <div class="face top"><label>LC 3D</label><span>🏁</span></div>
            <div class="face bottom"><label>AUTOVELOX</label><span>◆</span></div>
        </div>
    </div>

    <div class="hud-container">
        <div id="panel-digital">
            <div class="speed-display">
                <div class="speed-value" id="speed-val">0</div>
                <div class="unit">km/h</div>
            </div>
            <div class="gps-warning" id="gpsWarning">🔍 Buscando sinal GPS...</div>
            <div class="progress-container">
                <div class="progress-bar" id="p-bar"></div>
            </div>
        </div>

        <div id="panel-analog">
            <div class="analog-wrapper">
                <canvas id="gaugeCanvas" width="520" height="520"></canvas>
            </div>
            <div class="gps-warning" id="gpsWarningAnalog">🔍 Buscando sinal GPS...</div>
            <div class="progress-container">
                <div class="progress-bar" id="p-bar-analog"></div>
            </div>
        </div>

        <div class="map-container">
            <div id="map"></div>
        </div>

        <div class="grid">
            <div class="card"><label>Distância</label><span id="dist-val">0.00 km</span></div>
            <div class="card"><label>Média</label><span id="avg-val">0.0</span></div>
            <div class="card"><label>Rumo</label><span id="dir-val">-</span></div>
        </div>

        <button class="toggle-btn" onclick="switchPanel()">Alternar Painel</button>
    </div>

    <script>
        (function() {
            let currentMode = "digital";
            let totalDistance = 0;
            let lastCoord = null;
            let speedFilter = []; 
            let mapInstance = null;
            let pathPolyline = null;
            let positionMarker = null;
            let mapInitialized = false;
            let gpsErrorCount = 0;
            let lastUpdateTime = Date.now();
            let lastValidSpeed = 0;

            const speedVal = document.getElementById('speed-val');
            const pBar = document.getElementById('p-bar');
            const pBarAnalog = document.getElementById('p-bar-analog');
            const distVal = document.getElementById('dist-val');
            const avgVal = document.getElementById('avg-val');
            const dirVal = document.getElementById('dir-val');
            const canvas = document.getElementById('gaugeCanvas');
            const ctx = canvas.getContext('2d');
            const gpsWarning = document.getElementById('gpsWarning');
            const gpsWarningAnalog = document.getElementById('gpsWarningAnalog');
            const cubeElement = document.getElementById('cubeElement');
            const cubeCorner = document.getElementById('cubeCorner');

            cubeCorner.addEventListener('click', () => cubeElement.classList.toggle('rotating'));

            window.switchPanel = function() {
                const dig = document.getElementById('panel-digital');
                const ana = document.getElementById('panel-analog');
                if (currentMode === "digital") {
                    dig.style.display = "none";
                    ana.style.display = "block";
                    currentMode = "analog";
                    setTimeout(() => { resizeCanvas(); drawGauge(lastValidSpeed); }, 50);
                } else {
                    dig.style.display = "block";
                    ana.style.display = "none";
                    currentMode = "digital";
                }
            };

            function initMap(lat, lon) {
                if (mapInitialized) return;
                mapInstance = L.map('map', { attributionControl: false, zoomControl: false, zoom: 18, center: [lat, lon] });
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapInstance);
                const carIcon = L.divIcon({
                    html: '<div style="background:#e0243f;width:16px;height:16px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 10px #e0243f;"></div>',
                    className: '', iconSize: [0, 0]
                });
                positionMarker = L.marker([lat, lon], { icon: carIcon }).addTo(mapInstance);
                pathPolyline = L.polyline([[lat, lon]], { color: '#e0243f', weight: 4 }).addTo(mapInstance);
                mapInitialized = true;
            }

            function updateMap(lat, lon) {
                if (!mapInstance) return;
                positionMarker.setLatLng([lat, lon]);
                pathPolyline.addLatLng([lat, lon]);
                mapInstance.panTo([lat, lon], { animate: true, duration: 0.5 });
            }

            function resizeCanvas() {
                const size = Math.min(canvas.parentNode.clientWidth, 520);
                canvas.width = size; canvas.height = size;
            }

            function updateGPS(pos) {
                gpsWarning.style.display = 'none';
                gpsWarningAnalog.style.display = 'none';
                gpsErrorCount = 0;
                lastUpdateTime = Date.now();

                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                let rawSpeed = pos.coords.speed || 0;
                if (rawSpeed < 0) rawSpeed = 0;
                let kmh = rawSpeed * 3.6;

                // ALTERAÇÃO: Filtro ultra reduzido para resposta imediata
                speedFilter.push(kmh);
                if (speedFilter.length > 1) speedFilter.shift();
                let currentKmh = speedFilter[0];
                let displaySpeed = Math.round(currentKmh);
                lastValidSpeed = currentKmh;

                if (speedVal) speedVal.innerText = displaySpeed;
                const pct = Math.min((displaySpeed / 200) * 100, 100);
                if (pBar) pBar.style.width = pct + "%";
                if (pBarAnalog) pBarAnalog.style.width = pct + "%";

                if (lastCoord) {
                    totalDistance += haversine(lastCoord.lat, lastCoord.lon, lat, lon);
                }
                lastCoord = { lat, lon };

                if (distVal) distVal.innerText = (totalDistance / 1000).toFixed(2) + " km";
                if (avgVal) avgVal.innerText = displaySpeed;
                if (dirVal) dirVal.innerText = getCardinals(pos.coords.heading);

                if (lat && lon) {
                    if (!mapInitialized) initMap(lat, lon);
                    else updateMap(lat, lon);
                }

                if (currentMode === "analog") drawGauge(currentKmh);
            }

            function handleGPSError() {
                gpsErrorCount++;
                const msg = gpsErrorCount > 2 ? '⚠ Sinal GPS fraco' : '🔍 Buscando GPS...';
                gpsWarning.style.display = 'block'; gpsWarning.innerText = msg;
                gpsWarningAnalog.style.display = 'block'; gpsWarningAnalog.innerText = msg;
            }

            function haversine(lat1, lon1, lat2, lon2) {
                const R = 6371000;
                const dLat = (lat2 - lat1) * Math.PI / 180;
                const dLon = (lon2 - lon1) * Math.PI / 180;
                const a = Math.sin(dLat / 2) ** 2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) ** 2;
                return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            }

            function getCardinals(deg) {
                if (deg === null || isNaN(deg)) return "-";
                const sectors = ["N", "NE", "E", "SE", "S", "SW", "W", "NW"];
                return sectors[Math.round(deg / 45) % 8];
            }

            function drawGauge(speed) {
                const w = canvas.width, h = canvas.height;
                const cx = w / 2, cy = h * 0.54, radius = Math.min(w, h) * 0.4;
                ctx.clearRect(0, 0, w, h);

                // Aro Neon
                ctx.beginPath();
                ctx.arc(cx, cy, radius + 25, 0, Math.PI * 2);
                ctx.strokeStyle = '#00ff88'; ctx.lineWidth = 5;
                ctx.shadowBlur = 15; ctx.shadowColor = '#00ff88';
                ctx.stroke(); ctx.shadowBlur = 0;

                const startAngle = Math.PI * 0.78, endAngleTotal = Math.PI * 2.22;
                const progressAngle = startAngle + (Math.min(speed, 200) / 200) * (endAngleTotal - startAngle);

                // Arco fundo
                ctx.beginPath(); ctx.arc(cx, cy, radius, startAngle, endAngleTotal);
                ctx.strokeStyle = '#1c1c26'; ctx.lineWidth = 15; ctx.stroke();

                // Arco Progresso
                ctx.beginPath(); ctx.arc(cx, cy, radius, startAngle, progressAngle);
                ctx.strokeStyle = '#e0243f'; ctx.lineWidth = 15; ctx.stroke();

                // Números
                ctx.font = `bold ${radius * 0.12}px Orbitron`; ctx.fillStyle = '#00ff88';
                ctx.textAlign = 'center';
                for (let i = 0; i <= 200; i += 20) {
                    const angle = startAngle + (i / 200) * (endAngleTotal - startAngle);
                    ctx.fillText(i, cx + Math.cos(angle) * (radius - 40), cy + Math.sin(angle) * (radius - 40));
                }

                // Agulha
                ctx.save();
                ctx.translate(cx, cy); ctx.rotate(progressAngle + Math.PI / 2);
                ctx.beginPath(); ctx.moveTo(-5, 0); ctx.lineTo(0, -radius + 20); ctx.lineTo(5, 0);
                ctx.fillStyle = '#ff3b50'; ctx.fill();
                ctx.restore();

                // Centro
                ctx.beginPath(); ctx.arc(cx, cy, 10, 0, Math.PI * 2);
                ctx.fillStyle = '#fff'; ctx.fill();
            }

            if ("geolocation" in navigator) {
                // ALTERAÇÃO: Configurações para forçar atualização máxima do hardware
                navigator.geolocation.watchPosition(updateGPS, handleGPSError, {
                    enableHighAccuracy: true,
                    maximumAge: 0,
                    timeout: 2000
                });
            }

            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();
        })();
    </script>
</body>
</html>
