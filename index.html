<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>AutoVelox Pro – Velocímetro Realista</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root {
            --bg-deep: #0a0a1a;
            --card-bg: rgba(20, 20, 40, 0.92);
            --border-subtle: rgba(255, 255, 255, 0.15);
            --accent-cyan: #00d4ff;
            --accent-purple: #b44dff;
            --accent-white: #f0f0f0;
            --font-digital: 'Orbitron', 'Segoe UI', 'Roboto', monospace;
            --font-ui: 'Inter', 'Segoe UI', 'Roboto', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-ui);
            background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 50%, #0a0a1a 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 12px;
            overflow-x: hidden;
            position: relative;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        .app-header {
            width: 96%;
            max-width: 580px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 16px;
            margin-bottom: 6px;
            background: rgba(30, 20, 50, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            border: 1px solid rgba(180, 77, 255, 0.2);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.6), 0 0 20px rgba(180, 77, 255, 0.1);
            z-index: 10;
        }
        .app-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: var(--font-digital);
            font-weight: 700;
            font-size: 1.3rem;
            color: #ffffff;
            letter-spacing: 1px;
        }
        .app-logo .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--accent-cyan);
            box-shadow: 0 0 10px var(--accent-cyan);
            animation: pulse-dot 1.8s infinite;
        }
        @keyframes pulse-dot {
            0%, 100% { box-shadow: 0 0 6px var(--accent-cyan); }
            50% { box-shadow: 0 0 18px var(--accent-cyan), 0 0 30px rgba(0, 212, 255, 0.6); }
        }
        .app-badge {
            background: rgba(180, 77, 255, 0.15);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.7rem;
            letter-spacing: 2px;
            color: #ccc;
            border: 1px solid rgba(180, 77, 255, 0.3);
            text-transform: uppercase;
        }

        .cube-corner {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 999;
            width: 22vmin;
            height: 22vmin;
            max-width: 110px;
            max-height: 110px;
            min-width: 75px;
            min-height: 75px;
            perspective: 1000px;
            filter: drop-shadow(0 0 18px rgba(0, 212, 255, 0.55));
            cursor: pointer;
        }
        .cube {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
        }
        .cube.rotating {
            animation: rotateCube 12s infinite linear;
        }
        .face {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(20, 10, 40, 0.88);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(0, 212, 255, 0.45);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            backface-visibility: hidden;
            font-size: clamp(0.65rem, 2vmin, 0.9rem);
        }
        .face span {
            font-size: 1.7em;
            display: block;
            color: var(--accent-cyan);
            text-shadow: 0 0 18px var(--accent-cyan);
        }
        .front { transform: translateZ(50px); }
        .back { transform: rotateY(180deg) translateZ(50px); }
        .left { transform: rotateY(-90deg) translateZ(50px); }
        .right { transform: rotateY(90deg) translateZ(50px); }
        .top { transform: rotateX(90deg) translateZ(50px); }
        .bottom { transform: rotateX(-90deg) translateZ(50px); }

        @keyframes rotateCube {
            0% { transform: rotateX(-12deg) rotateY(0deg); }
            100% { transform: rotateX(-12deg) rotateY(360deg); }
        }

        .hud-container {
            width: 96%;
            max-width: 580px;
            background: var(--card-bg);
            backdrop-filter: blur(18px);
            padding: 18px 16px 20px;
            border-radius: 32px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.75), 0 0 30px rgba(0, 212, 255, 0.05);
            border: 1px solid var(--border-subtle);
            position: relative;
            z-index: 1;
        }

        #panel-digital { display: block; }
        #panel-analog { display: none; }

        .speed-display { padding: 20px 0 6px; text-align: center; }
        .speed-value {
            font-size: clamp(8rem, 40vw, 18rem);
            font-weight: 900;
            color: var(--accent-cyan);
            line-height: 0.9;
            letter-spacing: -4px;
            text-shadow: 0 0 30px rgba(0, 212, 255, 0.5);
        }
        .unit {
            font-size: 1.1rem;
            letter-spacing: 8px;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
        }

        .analog-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            min-height: 420px;
            position: relative;
        }
        canvas { display: block; max-width: 100%; height: auto; border-radius: 50%; }

        .progress-container {
            width: 100%;
            height: 10px;
            background: #1a1a2e;
            border-radius: 20px;
            margin: 14px 0 10px;
            overflow: hidden;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.3);
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-purple));
            transition: width 0.2s ease-out;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.6);
        }

        .gps-warning {
            text-align: center;
            color: var(--accent-purple);
            font-size: 0.75rem;
            margin-bottom: 8px;
            display: none;
        }

        .map-container {
            width: 100%;
            height: 35vh;
            max-height: 380px;
            border-radius: 24px;
            overflow: hidden;
            margin: 14px 0;
            border: 2px solid rgba(180, 77, 255, 0.3);
            box-shadow: 0 0 20px rgba(180, 77, 255, 0.1);
        }
        #map { width: 100%; height: 100%; }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin: 10px 0 14px;
        }
        .card {
            background: rgba(180, 77, 255, 0.08);
            padding: 14px 4px;
            border-radius: 16px;
            border: 1px solid rgba(180, 77, 255, 0.2);
            text-align: center;
            transition: all 0.3s ease;
        }
        .card:hover {
            background: rgba(180, 77, 255, 0.15);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(180, 77, 255, 0.2);
        }
        .card span { display: block; font-weight: 700; font-size: 1.2rem; color: #fff; margin-top: 4px; }
        .card label { font-size: 0.6rem; letter-spacing: 2px; color: #aaa; text-transform: uppercase; }

        .toggle-btn {
            margin: 6px auto 0;
            padding: 16px;
            border-radius: 50px;
            border: 1px solid rgba(180, 77, 255, 0.3);
            background: linear-gradient(135deg, rgba(30, 20, 50, 0.9), rgba(20, 10, 40, 0.9));
            color: #fff;
            font-weight: 700;
            text-transform: uppercase;
            width: 100%;
            cursor: pointer;
            font-family: var(--font-digital);
            transition: all 0.3s ease;
            letter-spacing: 2px;
        }
        .toggle-btn:hover {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.1), rgba(180, 77, 255, 0.1));
        }

        /* Estilo do odômetro dentro do velocímetro analógico */
        .odometer-overlay {
            position: absolute;
            bottom: 12%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 10, 30, 0.9);
            border: 2px solid rgba(0, 212, 255, 0.6);
            border-radius: 12px;
            padding: 8px 16px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3), inset 0 0 10px rgba(0, 212, 255, 0.1);
            backdrop-filter: blur(5px);
            z-index: 10;
        }
        
        .odometer-label {
            font-family: var(--font-digital);
            font-size: 0.55rem;
            letter-spacing: 2px;
            color: var(--accent-cyan);
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        
        .odometer-value {
            font-family: var(--font-digital);
            font-size: 1.2rem;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
        }
        
        .odometer-unit {
            font-family: var(--font-digital);
            font-size: 0.5rem;
            color: #aaa;
            letter-spacing: 1px;
            margin-top: 2px;
        }

        /* Efeito de partículas no background (opcional) */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(0, 212, 255, 0.03) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        @media (max-width: 600px) {
            .speed-value { font-size: clamp(6rem, 35vw, 12rem); }
            .map-container { height: 30vh; }
            .odometer-overlay {
                bottom: 14%;
                padding: 6px 12px;
            }
            .odometer-value {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

    <div class="app-header">
        <div class="app-logo"><span class="dot"></span> AutoVelox Pro</div>
        <div class="app-badge">v2.0 · Premium</div>
    </div>

    <div class="cube-corner" id="cubeCorner">
        <div class="cube rotating" id="cubeElement">
            <div class="face front"><label>LC</label><span>3D</span></div>
            <div class="face back"><label>SEVERINO</label><span>⚡</span></div>
            <div class="face left"><label>LC</label><span>PRO</span></div>
            <div class="face right"><label>SEVERINO</label><span>3D</span></div>
            <div class="face top"><label>LC 3D</label><span>🏁</span></div>
            <div class="face bottom"><label>AUTOVELOX</label><span>◆</span></div>
        </div>
    </div>

    <div class="hud-container">
        <div id="panel-digital">
            <div class="speed-display">
                <div class="speed-value" id="speed-val">0</div>
                <div class="unit">km/h</div>
            </div>
            <div class="gps-warning" id="gpsWarning">🔍 Buscando sinal GPS...</div>
            <div class="progress-container">
                <div class="progress-bar" id="p-bar"></div>
            </div>
        </div>

        <div id="panel-analog">
            <div class="analog-wrapper">
                <canvas id="gaugeCanvas" width="520" height="520"></canvas>
                <!-- Odômetro sobreposto ao velocímetro analógico -->
                <div class="odometer-overlay">
                    <div class="odometer-label">Odômetro</div>
                    <div class="odometer-value" id="odometer-value">0.00</div>
                    <div class="odometer-unit">km</div>
                </div>
            </div>
            <div class="gps-warning" id="gpsWarningAnalog">🔍 Buscando sinal GPS...</div>
            <div class="progress-container">
                <div class="progress-bar" id="p-bar-analog"></div>
            </div>
        </div>

        <div class="map-container">
            <div id="map"></div>
        </div>

        <div class="grid">
            <div class="card"><label>Distância</label><span id="dist-val">0.00 km</span></div>
            <div class="card"><label>Média</label><span id="avg-val">0.0</span></div>
            <div class="card"><label>Rumo</label><span id="dir-val">-</span></div>
        </div>

        <button class="toggle-btn" onclick="switchPanel()">Alternar Painel</button>
    </div>

    <script>
        (function() {
            let currentMode = "digital";
            let totalDistance = 0;
            let lastCoord = null;
            let speedFilter = []; 
            let mapInstance = null;
            let pathPolyline = null;
            let positionMarker = null;
            let mapInitialized = false;
            let gpsErrorCount = 0;
            let lastUpdateTime = Date.now();
            let lastValidSpeed = 0;

            const speedVal = document.getElementById('speed-val');
            const pBar = document.getElementById('p-bar');
            const pBarAnalog = document.getElementById('p-bar-analog');
            const distVal = document.getElementById('dist-val');
            const avgVal = document.getElementById('avg-val');
            const dirVal = document.getElementById('dir-val');
            const canvas = document.getElementById('gaugeCanvas');
            const ctx = canvas.getContext('2d');
            const gpsWarning = document.getElementById('gpsWarning');
            const gpsWarningAnalog = document.getElementById('gpsWarningAnalog');
            const cubeElement = document.getElementById('cubeElement');
            const cubeCorner = document.getElementById('cubeCorner');
            const odometerValue = document.getElementById('odometer-value');

            cubeCorner.addEventListener('click', () => cubeElement.classList.toggle('rotating'));

            window.switchPanel = function() {
                const dig = document.getElementById('panel-digital');
                const ana = document.getElementById('panel-analog');
                if (currentMode === "digital") {
                    dig.style.display = "none";
                    ana.style.display = "block";
                    currentMode = "analog";
                    setTimeout(() => { resizeCanvas(); drawGauge(lastValidSpeed); }, 50);
                } else {
                    dig.style.display = "block";
                    ana.style.display = "none";
                    currentMode = "digital";
                }
            };

            function initMap(lat, lon) {
                if (mapInitialized) return;
                mapInstance = L.map('map', { attributionControl: false, zoomControl: false, zoom: 18, center: [lat, lon] });
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapInstance);
                const carIcon = L.divIcon({
                    html: '<div style="background: #00d4ff; width: 16px; height: 16px; border-radius: 50%; border: 2px solid #fff; box-shadow: 0 0 15px #00d4ff, 0 0 30px rgba(0, 212, 255, 0.5);"></div>',
                    className: '', iconSize: [0, 0]
                });
                positionMarker = L.marker([lat, lon], { icon: carIcon }).addTo(mapInstance);
                pathPolyline = L.polyline([[lat, lon]], { color: '#b44dff', weight: 4, opacity: 0.8 }).addTo(mapInstance);
                mapInitialized = true;
            }

            function updateMap(lat, lon) {
                if (!mapInstance) return;
                positionMarker.setLatLng([lat, lon]);
                pathPolyline.addLatLng([lat, lon]);
                mapInstance.panTo([lat, lon], { animate: true, duration: 0.5 });
            }

            function resizeCanvas() {
                const size = Math.min(canvas.parentNode.clientWidth, 520);
                canvas.width = size; canvas.height = size;
            }

            function updateGPS(pos) {
                gpsWarning.style.display = 'none';
                gpsWarningAnalog.style.display = 'none';
                gpsErrorCount = 0;
                lastUpdateTime = Date.now();

                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                let rawSpeed = pos.coords.speed || 0;
                if (rawSpeed < 0) rawSpeed = 0;
                let kmh = rawSpeed * 3.6;

                // Filtro para suavização
                speedFilter.push(kmh);
                if (speedFilter.length > 1) speedFilter.shift();
                let currentKmh = speedFilter[0];
                let displaySpeed = Math.round(currentKmh);
                lastValidSpeed = currentKmh;

                if (speedVal) speedVal.innerText = displaySpeed;
                const pct = Math.min((displaySpeed / 200) * 100, 100);
                if (pBar) pBar.style.width = pct + "%";
                if (pBarAnalog) pBarAnalog.style.width = pct + "%";

                if (lastCoord) {
                    totalDistance += haversine(lastCoord.lat, lastCoord.lon, lat, lon);
                }
                lastCoord = { lat, lon };

                // Atualizar odômetro no velocímetro analógico
                const distanceKm = (totalDistance / 1000).toFixed(2);
                if (distVal) distVal.innerText = distanceKm + " km";
                if (odometerValue) odometerValue.innerText = distanceKm;
                if (avgVal) avgVal.innerText = displaySpeed;
                if (dirVal) dirVal.innerText = getCardinals(pos.coords.heading);

                if (lat && lon) {
                    if (!mapInitialized) initMap(lat, lon);
                    else updateMap(lat, lon);
                }

                if (currentMode === "analog") drawGauge(currentKmh);
            }

            function handleGPSError() {
                gpsErrorCount++;
                const msg = gpsErrorCount > 2 ? '⚠ Sinal GPS fraco' : '🔍 Buscando GPS...';
                gpsWarning.style.display = 'block'; gpsWarning.innerText = msg;
                gpsWarningAnalog.style.display = 'block'; gpsWarningAnalog.innerText = msg;
            }

            function haversine(lat1, lon1, lat2, lon2) {
                const R = 6371000;
                const dLat = (lat2 - lat1) * Math.PI / 180;
                const dLon = (lon2 - lon1) * Math.PI / 180;
                const a = Math.sin(dLat / 2) ** 2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) ** 2;
                return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            }

            function getCardinals(deg) {
                if (deg === null || isNaN(deg)) return "-";
                const sectors = ["N", "NE", "E", "SE", "S", "SW", "W", "NW"];
                return sectors[Math.round(deg / 45) % 8];
            }

            function drawGauge(speed) {
                const w = canvas.width, h = canvas.height;
                const cx = w / 2, cy = h * 0.54, radius = Math.min(w, h) * 0.4;
                ctx.clearRect(0, 0, w, h);

                // Aro Neon (Ciano)
                ctx.beginPath();
                ctx.arc(cx, cy, radius + 25, 0, Math.PI * 2);
                ctx.strokeStyle = '#00d4ff'; 
                ctx.lineWidth = 5;
                ctx.shadowBlur = 15; 
                ctx.shadowColor = '#00d4ff';
                ctx.stroke(); 
                ctx.shadowBlur = 0;

                const startAngle = Math.PI * 0.78, endAngleTotal = Math.PI * 2.22;
                const progressAngle = startAngle + (Math.min(speed, 200) / 200) * (endAngleTotal - startAngle);

                // Arco fundo
                ctx.beginPath(); 
                ctx.arc(cx, cy, radius, startAngle, endAngleTotal);
                ctx.strokeStyle = '#2a1a4a'; 
                ctx.lineWidth = 15; 
                ctx.stroke();

                // Arco Progresso (Púrpura)
                ctx.beginPath(); 
                ctx.arc(cx, cy, radius, startAngle, progressAngle);
                const gradient = ctx.createLinearGradient(0, 0, w, h);
                gradient.addColorStop(0, '#00d4ff');
                gradient.addColorStop(1, '#b44dff');
                ctx.strokeStyle = gradient; 
                ctx.lineWidth = 15; 
                ctx.shadowBlur = 10; 
                ctx.shadowColor = '#b44dff';
                ctx.stroke();
                ctx.shadowBlur = 0;

                // Números
                ctx.font = `bold ${radius * 0.12}px Orbitron`; 
                ctx.fillStyle = '#00d4ff';
                ctx.textAlign = 'center';
                for (let i = 0; i <= 200; i += 20) {
                    const angle = startAngle + (i / 200) * (endAngleTotal - startAngle);
                    ctx.fillText(i, cx + Math.cos(angle) * (radius - 40), cy + Math.sin(angle) * (radius - 40));
                }

                // Agulha
                ctx.save();
                ctx.translate(cx, cy); 
                ctx.rotate(progressAngle + Math.PI / 2);
                ctx.beginPath(); 
                ctx.moveTo(-5, 0); 
                ctx.lineTo(0, -radius + 20); 
                ctx.lineTo(5, 0);
                const needleGradient = ctx.createLinearGradient(0, 0, 0, -radius);
                needleGradient.addColorStop(0, '#b44dff');
                needleGradient.addColorStop(1, '#00d4ff');
                ctx.fillStyle = needleGradient; 
                ctx.fill();
                ctx.restore();

                // Centro
                ctx.beginPath(); 
                ctx.arc(cx, cy, 10, 0, Math.PI * 2);
                ctx.fillStyle = '#fff'; 
                ctx.shadowBlur = 8; 
                ctx.shadowColor = '#00d4ff';
                ctx.fill();
                ctx.shadowBlur = 0;
            }

            if ("geolocation" in navigator) {
                // Configurações para atualização do GPS
                navigator.geolocation.watchPosition(updateGPS, handleGPSError, {
                    enableHighAccuracy: true,
                    maximumAge: 0,
                    timeout: 2000
                });
            }

            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();
        })();
    </script>
</body>
</html>
